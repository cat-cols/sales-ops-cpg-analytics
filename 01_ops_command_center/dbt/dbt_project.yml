name: 'ops_command_center'
version: '1.0.0'
config-version: 2

profile: 'ops_command_center'

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analysis"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  ops_command_center:
    # Materialized as views for staging layer
    staging:
      +materialized: view
      +schema: stg
    
    # Materialized as views for integration layer
    integration:
      +materialized: view
      +schema: int
    
    # Materialized as tables for mart layer (business-ready)
    marts:
      +materialized: table
      +schema: mart
